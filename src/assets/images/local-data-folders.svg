<svg
    xmlns="http://www.w3.org/2000/svg"
    height="260"
    viewBox="0 40 800 370"
    fill="none"
    >
  <defs>
    <linearGradient
        id="card"
        x1="240"
        y1="80"
        x2="560"
        y2="370"
        gradientUnits="userSpaceOnUse"
        >
      <stop
          offset="0%"
          stop-color="#0a2a4a"
          />
      <stop
          offset="100%"
          stop-color="#07213f"
          />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur
          stdDeviation="6"
          result="blur"
          />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur
          stdDeviation="12"
          result="blur"
          />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect
      width="800"
      height="450"
      fill="url(#bg)"
      />

  <!-- Subtle grid dots -->
  <g opacity="0.06">
    <pattern
        id="dots"
        x="0"
        y="0"
        width="30"
        height="30"
        patternUnits="userSpaceOnUse"
        >
      <circle
          cx="15"
          cy="15"
          r="1"
          fill="#8ea7c7"
          />
    </pattern>
    <rect
        width="800"
        height="450"
        fill="url(#dots)"
        />
  </g>

  <!-- Decorative circles -->
  <circle
      cx="400"
      cy="225"
      r="180"
      stroke="#0083DD"
      stroke-opacity="0.06"
      stroke-width="1"
      fill="none"
      />
  <circle
      cx="400"
      cy="225"
      r="140"
      stroke="#0083DD"
      stroke-opacity="0.04"
      stroke-width="1"
      fill="none"
      />

  <!-- Main card -->
  <rect
      x="260"
      y="85"
      width="280"
      height="280"
      rx="16"
      fill="url(#card)"
      stroke="#0083DD"
      stroke-opacity="0.15"
      stroke-width="1"
      />

  <!-- Location pin icon -->
  <g filter="url(#glow)">
    <path
        d="M400 105 Q378 105 370 122 Q362 139 370 155 L400 195 L430 155 Q438 139 430 122 Q422 105 400 105 Z"
        fill="none"
        stroke="#0083DD"
        stroke-width="2"
        opacity="0.6"
        />
  </g>
  <path
      d="M400 107 Q380 107 372 123 Q364 139 372 154 L400 192 L428 154 Q436 139 428 123 Q420 107 400 107 Z"
      fill="#0a2a4a"
      stroke="#0083DD"
      stroke-width="1"
      opacity="0.5"
      />
  <circle
      cx="400"
      cy="135"
      r="10"
      fill="#0083DD"
      opacity="0.4"
      />

  <!-- Folder tree -->
  <!-- Root folder -->

        stroke="#0083DD"
        stroke-opacity="0.2"
        stroke-width="1"
        />
    <rect
        x="10"
        y="14"
        width="30"
        height="4"
        rx="2"
        fill="#8ea7c7"
        opacity="0.2"
        />
    <rect

  <rect
      width="800"
      height="450"
      fill="url(#bg)"
      />

  <!-- Subtle grid dots -->
  <g opacity="0.06">
    <pattern
        id="dots"
        x="0"
        y="0"
        width="30"
        height="30"
        patternUnits="userSpaceOnUse"

<svg
    xmlns="http://www.w3.org/2000/svg"
    height="260"
    viewBox="0 40 800 370"
    fill="none"
    >
  <defs>
    <linearGradient
        id="card"
        x1="250"
        y1="75"
        x2="550"
        y2="375"
        gradientUnits="userSpaceOnUse"
        >
      <stop
          offset="0%"
          stop-color="#0a2a4a"
          />
      <stop
          offset="100%"
          stop-color="#07213f"
          />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur
          stdDeviation="6"
          result="blur"
          />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur
          stdDeviation="12"
          result="blur"
          />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>


<svg
    xmlns="http://www.w3.org/2000/svg"
    height="260"
    viewBox="0 40 800 370"
    fill="none"
    >
  <defs>
    <linearGradient
        id="card"
        x1="240"
        y1="80"
        x2="560"
        y2="370"
        gradientUnits="userSpaceOnUse"
        >
      <stop
          offset="0%"
          stop-color="#0a2a4a"
          />
      <stop
          offset="100%"
          stop-color="#07213f"
          />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur
          stdDeviation="6"
          result="blur"
          />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur
          stdDeviation="12"
          result="blur"
          />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect
      width="800"
      height="450"
      fill="url(#bg)"
      />

  <!-- Subtle grid dots -->
  <g opacity="0.06">
    <pattern
        id="dots"
        x="0"
        y="0"
        width="30"
        height="30"
        patternUnits="userSpaceOnUse"
        >
      <circle
          cx="15"
          cy="15"
          r="1"
          fill="#8ea7c7"
          />
    </pattern>
    <rect
        width="800"
        height="450"
        fill="url(#dots)"
        />
  </g>

  <!-- Decorative circles -->
  <circle
      cx="400"
      cy="225"
      r="180"
      stroke="#0083DD"
      stroke-opacity="0.06"
      stroke-width="1"
      fill="none"
      />
  <circle
      cx="400"
      cy="225"
      r="140"
      stroke="#0083DD"
      stroke-opacity="0.04"
      stroke-width="1"
      fill="none"
      />

  <!-- Main card -->
  <rect
      x="270"
      y="85"
      width="260"
      height="280"
      rx="16"
      fill="url(#card)"
      stroke="#0083DD"
      stroke-opacity="0.15"
      stroke-width="1"
      />

  <!-- Flask icon -->
  <g filter="url(#glow)">
    <path
        d="M385 100 L385 155 L350 220 Q345 230 355 235 L445 235 Q455 230 450 220 L415 155 L415 100"
        stroke="#0083DD"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"
        opacity="0.5"
        />
  </g>
  <path
      d="M387 102 L387 157 L352 222 Q348 230 357 233 L443 233 Q452 230 448 222 L413 157 L413 102"
      fill="#0a2a4a"
      stroke="#0083DD"
      stroke-width="1"
      opacity="0.4"
      />

  <!-- Flask top rim -->
  <rect
      x="380"
      y="97"
      width="40"
      height="6"
      rx="3"
      fill="#0083DD"
      opacity="0.35"
      />

  <!-- Liquid in flask -->
  <path
      d="M362 210 L390 170 L410 170 L438 210 Q445 225 435 230 L365 230 Q355 225 362 210 Z"
      fill="#0083DD"
      opacity="0.15"
      />

  <!-- Bubbles in liquid -->
  <g filter="url(#softGlow)">
    <circle
        cx="390"
        cy="210"
        r="4"
        fill="#0083DD"
        opacity="0.4"
        />
    <circle
        cx="405"
        cy="200"
        r="3"
        fill="#00b4ff"
        opacity="0.35"
        />
    <circle
        cx="415"
        cy="215"
        r="2.5"
        fill="#0083DD"
        opacity="0.3"
        />
    <circle
        cx="380"
        cy="195"
        r="2"
        fill="#00b4ff"
        opacity="0.25"
        />
  </g>

  <!-- Toggle switches / experiment flags -->
  <g opacity="0.6">
    <!-- Flag 1 - on -->
    <rect
        x="310"
        y="258"
        width="32"
        height="16"
        rx="8"
        fill="#0a2a4a"
        stroke="#22c55e"
        stroke-width="1.2"
        opacity="0.7"
        />
    <circle
        cx="334"
        cy="266"
        r="5"
        fill="#22c55e"
        opacity="0.7"
        />
    <rect
        x="350"
        y="262"
        width="55"
        height="5"
        rx="2.5"
        fill="#8ea7c7"
        opacity="0.2"
        />

    <!-- Flag 2 - off -->
    <rect
        x="310"
        y="284"
        width="32"
        height="16"
        rx="8"
        fill="#0a2a4a"
        stroke="#8ea7c7"
        stroke-width="1.2"
        opacity="0.3"
        />
    <circle
        cx="318"
        cy="292"
        r="5"
        fill="#8ea7c7"
        opacity="0.3"
        />
    <rect
        x="350"
        y="288"
        width="40"
        height="5"
        rx="2.5"
        fill="#8ea7c7"
        opacity="0.12"
        />

    <!-- Flag 3 - on -->
    <rect
        x="310"
        y="310"
        width="32"
        height="16"
        rx="8"
        fill="#0a2a4a"
        stroke="#0083DD"
        stroke-width="1.2"
        opacity="0.6"
        />
    <circle
        cx="334"
        cy="318"
        r="5"
        fill="#0083DD"
        opacity="0.6"
        />
    <rect
        x="350"
        y="314"
        width="65"
        height="5"
        rx="2.5"
        fill="#8ea7c7"
        opacity="0.2"
        />

    <!-- Flag 4 - off -->
    <rect
        x="310"
        y="336"
        width="32"
        height="16"
        rx="8"
        fill="#0a2a4a"
        stroke="#8ea7c7"
        stroke-width="1.2"
        opacity="0.3"
        />
    <circle
        cx="318"
        cy="344"
        r="5"
        fill="#8ea7c7"
        opacity="0.25"
        />
    <rect
        x="350"
        y="340"
        width="50"
        height="5"
        rx="2.5"
        fill="#8ea7c7"
        opacity="0.12"
        />
  </g>

  <!-- Left decorative - DNA/helix -->
  <g
      opacity="0.35"
      transform="translate(120, 140)"
      >
    <path
        d="M10 0 Q40 30 10 60 Q-20 90 10 120"
        stroke="#0083DD"
        stroke-width="1.5"
        stroke-linecap="round"
        fill="none"
        opacity="0.5"
        />
    <path
        d="M40 0 Q10 30 40 60 Q70 90 40 120"
        stroke="#0083DD"
        stroke-width="1.5"
        stroke-linecap="round"
        fill="none"
        opacity="0.5"
        />
    <!-- Cross bars -->
    <line
        x1="15"
        y1="15"
        x2="35"
        y2="15"
        stroke="#0083DD"
        stroke-width="1"
        opacity="0.25"
        />
    <line
        x1="5"
        y1="45"
        x2="45"
        y2="45"
        stroke="#0083DD"
        stroke-width="1"
        opacity="0.25"
        />
    <line
        x1="15"
        y1="75"
        x2="35"
        y2="75"
        stroke="#0083DD"
        stroke-width="1"
        opacity="0.25"
        />
    <line
        x1="5"
        y1="105"
        x2="45"
        y2="105"
        stroke="#0083DD"
        stroke-width="1"
        opacity="0.25"
        />
  </g>

  <!-- Right decorative - A/B variant -->
  <g
      opacity="0.4"
      transform="translate(620, 155)"
      >
    <rect
        x="0"
        y="0"
        width="50"
        height="30"
        rx="6"
        fill="#0a2a4a"
        stroke="#0083DD"
        stroke-opacity="0.25"
        stroke-width="1"
        />
    <text
        x="18"
        y="21"
        font-family="monospace"
        font-size="14"
        fill="#0083DD"
        opacity="0.6"
        >A</text>

    <rect
        x="0"
        y="40"
        width="50"
        height="30"
        rx="6"
        fill="#0a2a4a"
        stroke="#8ea7c7"
        stroke-opacity="0.12"
        stroke-width="1"
        />
    <text
        x="18"
        y="61"
        font-family="monospace"
        font-size="14"
        fill="#8ea7c7"
        opacity="0.3"
        >B</text>
  </g>

  <!-- Right decorative - sparkle -->
  <g
      opacity="0.3"
      transform="translate(640, 270)"
      >
    <line
        x1="15"
        y1="0"
        x2="15"
        y2="30"
        stroke="#eab308"
        stroke-width="1"
        stroke-linecap="round"
        />
    <line
        x1="0"
        y1="15"
        x2="30"
        y2="15"
        stroke="#eab308"
        stroke-width="1"
        stroke-linecap="round"
        />
    <line
        x1="5"
        y1="5"
        x2="25"
        y2="25"
        stroke="#eab308"
        stroke-width="0.8"
        stroke-linecap="round"
        />
    <line
        x1="25"
        y1="5"
        x2="5"
        y2="25"
        stroke="#eab308"
        stroke-width="0.8"
        stroke-linecap="round"
        />
  </g>

  <!-- Floating particles -->
  <circle
      cx="180"
      cy="120"
      r="2"
      fill="#0083DD"
      opacity="0.2"
      />
  <circle
      cx="650"
      cy="100"
      r="1.5"
      fill="#0083DD"
      opacity="0.15"
      />
  <circle
      cx="700"
      cy="350"
      r="2"
      fill="#0083DD"
      opacity="0.1"
      />
  <circle
      cx="130"
      cy="330"
      r="1.5"
      fill="#0083DD"
      opacity="0.15"
      />
  <circle
      cx="220"
      cy="380"
      r="1"
      fill="#0083DD"
      opacity="0.1"
      />
</svg>
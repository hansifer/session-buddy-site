        width="60"
        height="5"
        rx="2.5"
        fill="#8ea7c7"
        opacity="0.2"
        />
  </g>

  <!-- Shield/check on backup -->
  <g filter="url(#softGlow)">
    <path
        d="M525 255 L525 275 Q525 295 505 305 Q485 295 485 275 L485 255 L505 248 L525 255 Z"
        fill="#0a2a4a"
        stroke="#22c55e"
        stroke-width="1.5"
        opacity="0.6"
        />
    <polyline

        y="130"
        width="64"
        height="6"
        rx="3"
        fill="#8ea7c7"
        opacity="0.3"
        />
    <rect
        x="490"
        y="144"
        width="50"
        height="5"
        rx="2.5"
        fill="#8ea7c7"
        opacity="0.2"
        />
    <rect
        x="490"
        y="157"
        width="58"
        height="5"
        rx="2.5"
        fill="#8ea7c7"
        opacity="0.2"
        />
    <rect
        x="490"
        y="170"
        width="40"
        height="5"
        rx="2.5"
        fill="#8ea7c7"
        opacity="0.15"
        />
    <rect
        x="490"
        y="183"
        width="55"
        height="5"
        rx="2.5"
        fill="#8ea7c7"
        opacity="0.18"
        />
    <rect
        x="490"
        y="196"
        width="45"
        height="5"
        rx="2.5"
        fill="#8ea7c7"
        opacity="0.15"
        />
    <rect
        x="490"

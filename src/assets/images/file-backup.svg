        stroke="#22c55e"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"
        opacity="0.7"
        />
  </g>

  <!-- Clock icon on source -->
  <g
      opacity="0.5"
      transform="translate(305, 260)"

<svg
    xmlns="http://www.w3.org/2000/svg"
    height="260"
    viewBox="0 40 800 370"
    fill="none"
    >
  <defs>
    <linearGradient
        id="card"
        x1="250"
        y1="75"
        x2="550"
        y2="375"
        gradientUnits="userSpaceOnUse"
        >
      <stop
          offset="0%"
          stop-color="#0a2a4a"
          />
      <stop
          offset="100%"
          stop-color="#07213f"
          />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur
          stdDeviation="6"
          result="blur"
          />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur
          stdDeviation="12"
          result="blur"
          />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect
      width="800"
      height="450"
      fill="url(#bg)"
      />

  <!-- Subtle grid dots -->
  <g opacity="0.06">
    <pattern
        id="dots"
        x="0"
        y="0"
        width="30"
        height="30"
        patternUnits="userSpaceOnUse"
        >
      <circle
          cx="15"
          cy="15"
          r="1"
          fill="#8ea7c7"
          />
    </pattern>
    <rect
        width="800"
        height="450"
        fill="url(#dots)"
        />
  </g>

  <!-- Decorative circles -->
  <circle
      cx="400"
      cy="225"
      r="180"
      stroke="#0083DD"
      stroke-opacity="0.06"
      stroke-width="1"
      fill="none"
      />
  <circle
      cx="400"
      cy="225"
      r="140"
      stroke="#0083DD"
      stroke-opacity="0.04"
      stroke-width="1"
      fill="none"
      />

  <!-- Main card -->
  <rect
      x="250"
      y="75"
      width="300"
      height="300"
      rx="16"
      fill="url(#card)"
      stroke="#0083DD"
      stroke-opacity="0.15"
      stroke-width="1"
      />

  <!-- Magnifying glass -->
  <g filter="url(#glow)">
    <circle
        cx="395"
        cy="140"
        r="30"
        stroke="#0083DD"
        stroke-width="2"
        fill="#0a2a4a"
        fill-opacity="0.5"
        opacity="0.6"
        />
    <!-- Handle -->
    <line
        x1="416"
        y1="162"
        x2="437"
        y2="183"
        stroke="#0083DD"
        stroke-width="4"
        stroke-linecap="round"
        opacity="0.5"
        />
  </g>

  <!-- Lens highlight -->
  <path
      d="M377 122 Q383 116 393 118"
      stroke="#0083DD"
      stroke-width="1.5"
      stroke-linecap="round"
      fill="none"
      opacity="0.25"
      />

  <!-- Exclamation mark inside lens -->
  <line
      x1="395"
      y1="127"
      x2="395"
      y2="143"
      stroke="#eab308"
      stroke-width="2.5"
      stroke-linecap="round"
      opacity="0.55"
      />
  <circle
      cx="395"
      cy="150"
      r="1.8"
      fill="#eab308"
      opacity="0.55"
      />

  <!-- Horizontal divider -->
  <line
      x1="280"
      y1="200"
      x2="520"
      y2="200"
      stroke="#0083DD"
      stroke-opacity="0.08"
      stroke-width="1"
      />

  <!-- Step 1 - identify -->
  <g opacity="0.55">
    <circle
        cx="300"
        cy="225"
        r="10"
        fill="#0a2a4a"
        stroke="#ff5f57"
        stroke-width="1.5"
        opacity="0.6"
        />
    <text
        x="297"
        y="229"
        font-family="monospace"
        font-size="11"
        fill="#ff5f57"
        opacity="0.7"
        >1</text>
    <rect
        x="320"
        y="221"
        width="75"
        height="6"
        rx="3"
        fill="#8ea7c7"
        opacity="0.25"
        />
  </g>

  <!-- Step 2 - diagnose -->
  <g opacity="0.55">
    <circle
        cx="300"
        cy="255"
        r="10"
        fill="#0a2a4a"
        stroke="#eab308"
        stroke-width="1.5"
        opacity="0.6"
        />
    <text
        x="297"
        y="259"
        font-family="monospace"
        font-size="11"
        fill="#eab308"
        opacity="0.7"
        >2</text>
    <rect
        x="320"
        y="251"
        width="90"
        height="6"
        rx="3"
        fill="#8ea7c7"
        opacity="0.2"
        />
  </g>

  <!-- Connector lines between steps -->
  <line
      x1="300"
      y1="236"
      x2="300"
      y2="244"
      stroke="#8ea7c7"
      stroke-opacity="0.15"
      stroke-width="1"
      stroke-dasharray="2 2"
      />
  <line
      x1="300"
      y1="266"
      x2="300"
      y2="274"
      stroke="#8ea7c7"
      stroke-opacity="0.15"
      stroke-width="1"
      stroke-dasharray="2 2"
      />
  <line
      x1="300"
      y1="296"
      x2="300"
      y2="304"
      stroke="#8ea7c7"
      stroke-opacity="0.15"
      stroke-width="1"
      stroke-dasharray="2 2"
      />

  <!-- Step 3 - fix -->
  <g opacity="0.55">
    <circle
        cx="300"
        cy="285"
        r="10"
        fill="#0a2a4a"
        stroke="#0083DD"
        stroke-width="1.5"
        opacity="0.6"
        />
    <text
        x="297"
        y="289"
        font-family="monospace"
        font-size="11"
        fill="#0083DD"
        opacity="0.7"
        >3</text>
    <rect
        x="320"
        y="281"
        width="60"
        height="6"
        rx="3"
        fill="#8ea7c7"
        opacity="0.2"
        />
  </g>

  <!-- Step 4 - verify -->
  <g opacity="0.6">
    <circle
        cx="300"
        cy="315"
        r="10"
        fill="#0a2a4a"
        stroke="#22c55e"
        stroke-width="1.5"
        opacity="0.7"
        />
    <polyline
        points="295,315 299,320 307,310"
        stroke="#22c55e"
        stroke-width="1.8"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"
        opacity="0.7"
        />
    <rect
        x="320"
        y="311"
        width="80"
        height="6"
        rx="3"
        fill="#22c55e"
        opacity="0.15"
        />
  </g>

  <!-- Right side - log/output panel -->
  <g opacity="0.45">
    <rect
        x="430"
        y="215"
        width="100"
        height="110"
        rx="8"
        fill="#0a2a4a"
        stroke="#0083DD"
        stroke-opacity="0.15"
        stroke-width="1"
        />
    <!-- Log lines -->
    <rect
        x="440"
        y="228"
        width="55"
        height="4"
        rx="2"
        fill="#ff5f57"
        opacity="0.3"
        />
    <rect
        x="440"
        y="240"
        width="70"
        height="4"
        rx="2"
        fill="#8ea7c7"
        opacity="0.15"
        />
    <rect
        x="440"
        y="252"
        width="50"
        height="4"
        rx="2"
        fill="#8ea7c7"
        opacity="0.12"
        />
    <rect
        x="440"
        y="264"
        width="65"
        height="4"
        rx="2"
        fill="#eab308"
        opacity="0.25"
        />
    <rect
        x="440"
        y="276"
        width="58"
        height="4"
        rx="2"
        fill="#8ea7c7"
        opacity="0.12"
        />
    <rect
        x="440"
        y="288"
        width="72"
        height="4"
        rx="2"
        fill="#8ea7c7"
        opacity="0.15"
        />
    <rect
        x="440"
        y="300"
        width="48"
        height="4"
        rx="2"
        fill="#22c55e"
        opacity="0.25"
        />
  </g>

  <!-- Left decorative - warning signs -->
  <g
      opacity="0.35"
      transform="translate(110, 145)"
      >
    <!-- Triangle 1 -->
    <path
        d="M30 5 L50 40 L10 40 Z"
        stroke="#eab308"
        stroke-width="1.5"
        stroke-linejoin="round"
        fill="none"
        opacity="0.5"
        />
    <line
        x1="30"
        y1="18"
        x2="30"
        y2="30"
        stroke="#eab308"
        stroke-width="1.5"
        stroke-linecap="round"
        opacity="0.4"
        />
    <circle
        cx="30"
        cy="35"
        r="1.5"
        fill="#eab308"
        opacity="0.4"
        />
  </g>

  <!-- Left decorative - crosshair -->
  <g
      opacity="0.25"
      transform="translate(120, 250)"
      >
    <circle
        cx="20"
        cy="20"
        r="15"
        stroke="#0083DD"
        stroke-width="1"
        fill="none"
        />
    <circle
        cx="20"
        cy="20"
        r="8"
        stroke="#0083DD"
        stroke-width="1"
        fill="none"
        />
    <line
        x1="20"
        y1="2"
        x2="20"
        y2="12"
        stroke="#0083DD"
        stroke-width="1"
        />
    <line
        x1="20"
        y1="28"
        x2="20"
        y2="38"
        stroke="#0083DD"
        stroke-width="1"
        />
    <line
        x1="2"
        y1="20"
        x2="12"
        y2="20"
        stroke="#0083DD"
        stroke-width="1"
        />
    <line
        x1="28"
        y1="20"
        x2="38"
        y2="20"
        stroke="#0083DD"
        stroke-width="1"
        />
  </g>

  <!-- Right decorative - gear -->
  <g
      opacity="0.3"
      transform="translate(625, 150)"
      >
    <circle
        cx="30"
        cy="30"
        r="16"
        stroke="#0083DD"
        stroke-width="1.5"
        fill="none"
        opacity="0.4"
        />
    <circle
        cx="30"
        cy="30"
        r="7"
        stroke="#0083DD"
        stroke-width="1.5"
        fill="none"
        opacity="0.3"
        />
    <!-- Gear teeth (simple rects at cardinal + diagonal positions) -->
    <rect
        x="27"
        y="10"
        width="6"
        height="8"
        rx="1.5"
        fill="#0083DD"
        opacity="0.3"
        />
    <rect
        x="27"
        y="42"
        width="6"
        height="8"
        rx="1.5"
        fill="#0083DD"
        opacity="0.3"
        />
    <rect
        x="10"
        y="27"
        width="8"
        height="6"
        rx="1.5"
        fill="#0083DD"
        opacity="0.3"
        />
    <rect
        x="42"
        y="27"
        width="8"
        height="6"
        rx="1.5"
        fill="#0083DD"
        opacity="0.3"
        />
  </g>

  <!-- Right decorative - checkmark list -->
  <g
      opacity="0.3"
      transform="translate(635, 265)"
      >
    <circle
        cx="6"
        cy="6"
        r="3"
        fill="#22c55e"
        opacity="0.6"
        />
    <rect
        x="15"
        y="3.5"
        width="40"
        height="4"
        rx="2"
        fill="#8ea7c7"
        opacity="0.2"
        />
    <circle
        cx="6"
        cy="22"
        r="3"
        fill="#22c55e"
        opacity="0.6"
        />
    <rect
        x="15"
        y="19.5"
        width="32"
        height="4"
        rx="2"
        fill="#8ea7c7"
        opacity="0.15"
        />
    <circle
        cx="6"
        cy="38"
        r="3"
        fill="#8ea7c7"
        opacity="0.2"
        />
    <rect
        x="15"
        y="35.5"
        width="44"
        height="4"
        rx="2"
        fill="#8ea7c7"
        opacity="0.1"
        />
  </g>

  <!-- Floating particles -->
  <circle
      cx="180"
      cy="120"
      r="2"
      fill="#0083DD"
      opacity="0.2"
      />
  <circle
      cx="650"
      cy="100"
      r="1.5"
      fill="#0083DD"
      opacity="0.15"
      />
  <circle
      cx="700"
      cy="350"
      r="2"
      fill="#0083DD"
      opacity="0.1"
      />
  <circle
      cx="130"
      cy="330"
      r="1.5"
      fill="#0083DD"
      opacity="0.15"
      />
  <circle
      cx="220"
      cy="380"
      r="1"
      fill="#0083DD"
      opacity="0.1"
      />
</svg>
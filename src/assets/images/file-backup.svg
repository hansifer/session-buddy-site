<svg
    xmlns="http://www.w3.org/2000/svg"
    height="260"
    viewBox="0 40 800 370"
    fill="none"
    >
  <defs>
    <linearGradient
        id="card"
        x1="240"
        y1="80"
        x2="560"
        y2="370"
        gradientUnits="userSpaceOnUse"
        >
      <stop
          offset="0%"
          stop-color="#0a2a4a"
          />
      <stop
          offset="100%"
          stop-color="#07213f"
          />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur
          stdDeviation="6"
          result="blur"
          />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur
          stdDeviation="12"
          result="blur"
          />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect
      width="800"
      height="450"
      fill="url(#bg)"
      />

  <!-- Subtle grid dots -->
  <g opacity="0.06">
    <pattern
        id="dots"
        x="0"
        y="0"
        width="30"
        height="30"
        patternUnits="userSpaceOnUse"
        >
      <circle
          cx="15"
          cy="15"
          r="1"
          fill="#8ea7c7"
          />
    </pattern>
    <rect
        width="800"
        height="450"
        fill="url(#dots)"
        />
  </g>

  <!-- Decorative circles -->
  <circle
      cx="400"
      cy="225"
      r="180"
      stroke="#0083DD"
      stroke-opacity="0.06"
      stroke-width="1"
      fill="none"
      />
  <circle
      cx="400"
      cy="225"
      r="140"
      stroke="#0083DD"
      stroke-opacity="0.04"
      stroke-width="1"
      fill="none"
      />

  <!-- Source file card -->
  <rect
      x="265"
      y="100"
      width="120"
      height="150"
      rx="10"
      fill="url(#card)"
      stroke="#0083DD"
      stroke-opacity="0.2"
      stroke-width="1"
      />

  <!-- Source file - folded corner -->
  <path
      d="M355 100 L385 130 L355 130 Z"
      fill="#0a2a4a"
      stroke="#0083DD"
      stroke-opacity="0.15"
      stroke-width="0.5"
      />

  <!-- Source file icon -->
  <g opacity="0.5">
    <rect
        x="290"
        y="130"
        width="64"
        height="6"
        rx="3"
        fill="#8ea7c7"
        opacity="0.3"
        />
    <rect
        x="290"
        y="144"
        width="50"
        height="5"
        rx="2.5"
        fill="#8ea7c7"
        opacity="0.2"
        />
    <rect
        x="290"
        y="157"
        width="58"
        height="5"
        rx="2.5"
        fill="#8ea7c7"
        opacity="0.2"
        />
    <rect
        x="290"
        y="170"
        width="40"
        height="5"
        rx="2.5"
        fill="#8ea7c7"
        opacity="0.15"
        />
    <rect
        x="290"
        y="183"
        width="55"
        height="5"
        rx="2.5"
        fill="#8ea7c7"
        opacity="0.18"
        />
    <rect
        x="290"
        y="196"
        width="45"
        height="5"
        rx="2.5"
        fill="#8ea7c7"
        opacity="0.15"
        />
    <rect
        x="290"
        y="209"
        width="60"
        height="5"
        rx="2.5"
        fill="#8ea7c7"
        opacity="0.2"
        />
  </g>

  <!-- Arrow -->
  <g filter="url(#glow)">
    <path
        d="M400 195 L450 195"
        stroke="#0083DD"
        stroke-width="2"
        stroke-linecap="round"
        opacity="0.7"
        />
    <polyline
        points="442,188 452,195 442,202"
        stroke="#0083DD"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"
        opacity="0.7"
        />
  </g>

  <!-- Backup file card (copy) -->
  <rect

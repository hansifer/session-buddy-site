<svg
    xmlns="http://www.w3.org/2000/svg"
    height="260"
    viewBox="0 40 800 370"
    fill="none"
    >
  <defs>
    <linearGradient
        id="card"
        x1="240"
        y1="80"
        x2="560"
        y2="370"
        gradientUnits="userSpaceOnUse"
        >
      <stop
          offset="0%"
          stop-color="#0a2a4a"
          />
      <stop
          offset="100%"
          stop-color="#07213f"
          />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur
          stdDeviation="6"
          result="blur"
          />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur
          stdDeviation="12"
          result="blur"
          />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect
      width="800"
      height="450"
      fill="url(#bg)"
      />

  <!-- Subtle grid dots -->
  <g opacity="0.06">
    <pattern
        id="dots"
        x="0"
        y="0"
        width="30"
        height="30"
        patternUnits="userSpaceOnUse"
        >
      <circle
          cx="15"
          cy="15"
          r="1"
          fill="#8ea7c7"
          />
    </pattern>
    <rect
        width="800"
        height="450"
        fill="url(#dots)"
        />
  </g>

  <!-- Decorative circles -->
  <circle
      cx="400"
      cy="225"
      r="180"
      stroke="#0083DD"
      stroke-opacity="0.06"
      stroke-width="1"
      fill="none"
      />
  <circle
      cx="400"
      cy="225"
      r="140"
      stroke="#0083DD"
      stroke-opacity="0.04"
      stroke-width="1"
      fill="none"
      />

  <!-- Main card -->
  <rect
      x="260"
      y="85"
      width="280"
      height="280"
      rx="16"
      fill="url(#card)"
      stroke="#0083DD"
      stroke-opacity="0.15"
      stroke-width="1"
      />

  <!-- Profile avatar circle -->
  <g filter="url(#glow)">
    <circle
        cx="400"
        cy="175"
        r="42"
        stroke="#0083DD"
        stroke-width="2"
        fill="none"
        opacity="0.5"
        />
  </g>
  <circle
      cx="400"
      cy="175"
      r="40"
      stroke="#0083DD"
      stroke-width="1.5"
      fill="#0a2a4a"
      opacity="0.8"
      />

  <!-- User silhouette - head -->
  <circle
      cx="400"
      cy="162"
      r="14"
      fill="#0083DD"
      opacity="0.5"
      />

  <!-- User silhouette - body -->
  <path
      d="M378 195 Q378 180 400 180 Q422 180 422 195"
      fill="#0083DD"
      opacity="0.4"
      />

  <!-- Profile name placeholder -->
  <rect
      x="360"
      y="228"
      width="80"
      height="8"
      rx="4"
      fill="#8ea7c7"
      opacity="0.3"
      />
  <rect
      x="370"
      y="244"
      width="60"
      height="6"
      rx="3"
      fill="#8ea7c7"
      opacity="0.15"
      />

  <!-- Profile selector dots -->
  <g opacity="0.5">
    <circle
        cx="375"
        cy="275"
        r="4"
        fill="#0083DD"
        opacity="0.8"
        />
    <circle
        cx="400"
        cy="275"
        r="4"
        fill="#0083DD"
        opacity="0.3"
        />
    <circle
        cx="425"
        cy="275"
        r="4"
        fill="#0083DD"
        opacity="0.3"
        />
  </g>

  <!-- Profile cards list -->
  <g opacity="0.45">
    <!-- Card 1 -->
    <rect
        x="300"
        y="300"
        width="200"
        height="22"
        rx="6"
        fill="#0a2a4a"
        stroke="#0083DD"
        stroke-opacity="0.25"
        stroke-width="1"
        />
    <circle
        cx="318"
        cy="311"
        r="6"
        fill="#0083DD"
        opacity="0.4"
        />
    <rect
        x="332"
        y="308"
        width="70"
        height="6"
        rx="3"
        fill="#8ea7c7"
        opacity="0.25"
        />

    <!-- Card 2 -->
    <rect
        x="300"
        y="330"
        width="200"
        height="22"
        rx="6"
        fill="#0a2a4a"
        stroke="#8ea7c7"
        stroke-opacity="0.1"
        stroke-width="1"
        />
    <circle
        cx="318"
        cy="341"
        r="6"
        fill="#22c55e"
        opacity="0.4"
        />
    <rect
        x="332"
        y="338"
        width="55"
        height="6"
        rx="3"
        fill="#8ea7c7"
        opacity="0.15"
        />
  </g>

  <!-- Left decorative - Chrome-like circles -->
  <g
      opacity="0.4"
      transform="translate(110, 160)"
      >
    <circle
        cx="40"
        cy="40"
        r="30"
        stroke="#0083DD"
        stroke-width="1.5"
        fill="none"
        opacity="0.3"
        />
    <path
        d="M40 10 A30 30 0 0 1 66 55"
        stroke="#ff5f57"
        stroke-width="3"
        stroke-linecap="round"
        fill="none"
        opacity="0.4"
        />
    <path
        d="M66 55 A30 30 0 0 1 14 55"
        stroke="#22c55e"
        stroke-width="3"
        stroke-linecap="round"
        fill="none"
        opacity="0.4"
        />
    <path
        d="M14 55 A30 30 0 0 1 40 10"
        stroke="#eab308"
        stroke-width="3"
        stroke-linecap="round"
        fill="none"
        opacity="0.4"
        />
    <circle
        cx="40"
        cy="40"
        r="12"
        fill="#0083DD"
        opacity="0.2"
        />
  </g>

  <!-- Right decorative - profile stack -->
  <g
      opacity="0.35"
      transform="translate(620, 150)"
      >
    <rect
        x="0"
        y="0"
        width="60"
        height="35"
        rx="6"
        fill="#0a2a4a"
        stroke="#0083DD"
        stroke-opacity="0.2"
        stroke-width="1"
        />
    <circle
        cx="18"
        cy="17"
        r="8"
        fill="#0083DD"
        opacity="0.25"
        />
    <rect
        x="32"
        y="12"
        width="20"
        height="4"
        rx="2"
        fill="#8ea7c7"
        opacity="0.2"
        />
    <rect
        x="32"
        y="20"
        width="14"
        height="3"
        rx="1.5"
        fill="#8ea7c7"
        opacity="0.12"
        />
  </g>
  <g
      opacity="0.25"
      transform="translate(630, 210)"
      >
    <rect
        x="0"
        y="0"
        width="55"
        height="35"
        rx="6"
        fill="#0a2a4a"
        stroke="#8ea7c7"
        stroke-opacity="0.12"
        stroke-width="1"
        />
    <circle
        cx="16"
        cy="17"
        r="8"
        fill="#22c55e"
        opacity="0.25"
        />
    <rect
        x="30"
        y="12"
        width="18"
        height="4"
        rx="2"
        fill="#8ea7c7"
        opacity="0.15"
        />
    <rect
        x="30"
        y="20"
        width="12"
        height="3"
        rx="1.5"
        fill="#8ea7c7"
        opacity="0.1"
        />
  </g>

  <!-- Floating particles -->
  <circle
      cx="180"
      cy="120"
      r="2"
      fill="#0083DD"
      opacity="0.2"
      />
  <circle
      cx="650"
      cy="100"
      r="1.5"
      fill="#0083DD"
      opacity="0.15"
      />
  <circle
      cx="700"
      cy="350"
      r="2"
      fill="#0083DD"
      opacity="0.1"
      />
  <circle
      cx="130"
      cy="330"
      r="1.5"
      fill="#0083DD"
      opacity="0.15"
      />
  <circle
      cx="220"
      cy="380"
      r="1"
      fill="#0083DD"
      opacity="0.1"
      />
</svg>
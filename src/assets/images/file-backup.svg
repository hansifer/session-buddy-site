  </g>

  <!-- Floating particles -->
  <circle
      cx="180"
      cy="120"
      r="2"
      fill="#0083DD"
      opacity="0.2"
      />
  <circle
      cx="650"
      cy="100"
      r="1.5"
      fill="#0083DD"
      opacity="0.15"
      />
  <circle
      cx="700"

        height="3"
        rx="1.5"
        fill="#8ea7c7"
        opacity="0.12"
        />
  </g>

  <!-- Right decorative - storage indicator -->
  <g
      opacity="0.4"
      transform="translate(640, 170)"
      >
    <rect
        x="0"
        y="0"
        width="65"
        height="8"
        rx="4"
        fill="#0a2a4a"
        stroke="#8ea7c7"
        stroke-opacity="0.15"
        stroke-width="1"
        />
    <rect
        x="1"
        y="1"
        width="40"
        height="6"
        rx="3"
        fill="#0083DD"
        opacity="0.4"
        />

    <rect
        x="0"
        y="20"
        width="65"
        height="8"
        rx="4"
        fill="#0a2a4a"
        stroke="#8ea7c7"
        stroke-opacity="0.15"
        stroke-width="1"
        />
    <rect
        x="1"
